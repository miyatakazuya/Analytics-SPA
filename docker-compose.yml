version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_DSN=collector:C0ll3ct0r_!2026_Secure@tcp(mysql:3306)/webanalytics?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=super-secret-key
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=webanalytics
      - MYSQL_USER=collector
      - MYSQL_PASSWORD=C0ll3ct0r_!2026_Secure
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"

