<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: #333;
      color: white;
      padding: 1rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    header h2 {
      margin: 0;
      margin-right: 2rem;
    }

    header a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 1rem;
      background: #555;
      border-radius: 4px;
    }

    header a:hover {
      background: #777;
    }

    main {
      padding: 2rem;
      flex: 1;
    }
  </style>
</head>

<body>
  <header>
    <h2>SPA Dashboard</h2>
    <a href="#/login">Login Route</a>
    <a href="#/overview">Overview Route</a>
    <a href="#/admin">Admin Route</a>
  </header>

  <main id="app-content">
  </main>

  <script src="js/app.js"></script>
</body>

</html>
